<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" role="img" aria-label="GTMLens">
  <title>GTMLens</title>
  <defs>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1F3C"/>
      <stop offset="100%" stop-color="#2A5FA5"/>
    </linearGradient>
  </defs>
  <!-- Lens mark: outer ring + inner aperture + crosshair -->
  <g transform="translate(4,4)">
    <circle cx="20" cy="20" r="19" fill="none" stroke="url(#lens)" stroke-width="2.5"/>
    <circle cx="20" cy="20" r="11" fill="none" stroke="#C8722A" stroke-width="2"/>
    <circle cx="20" cy="20" r="3.5" fill="#C8722A"/>
    <line x1="20" y1="2" x2="20" y2="6" stroke="#0D1F3C" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="20" x2="34" y2="20" stroke="#0D1F3C" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Wordmark: GTM (heavy) + Lens (light) -->
  <text x="56" y="32" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#0D1F3C" letter-spacing="-0.5">GTM<tspan font-weight="400" fill="#5A6272">Lens</tspan></text>
</svg>
